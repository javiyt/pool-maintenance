---
version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: '09:00'
    timezone: Europe/Madrid
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - javascript
  commit-message:
    prefix: chore
    include: scope
  groups:
    vite-tooling:
      patterns:
      - vite
      - vitest
      - "@vitejs/*"
    typescript-tooling:
      patterns:
      - typescript
      - "@types/*"
  assignees:
  - javiyt
  reviewers:
  - javiyt
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: '09:30'
    timezone: Europe/Madrid
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  commit-message:
    prefix: chore
    include: scope
  assignees:
  - javiyt
  reviewers:
  - javiyt
